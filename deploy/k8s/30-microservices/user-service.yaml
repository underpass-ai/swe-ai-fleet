apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-service-data
  namespace: swe-ai-fleet
  labels:
    app: user-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: swe-ai-fleet
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: user-service
          image: registry.underpassai.com/swe-ai-fleet/user-service:latest
          ports:
            - containerPort: 50058
              name: grpc
              protocol: TCP
          env:
            - name: PORT
              value: "50058"
            - name: DUCKDB_PATH
              value: "/data/user-service.duckdb"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 50058
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 50058
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: user-service-data
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: swe-ai-fleet
  labels:
    app: user-service
spec:
  type: ClusterIP
  ports:
    - port: 50058
      targetPort: 50058
      name: grpc
      protocol: TCP
  selector:
    app: user-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-service-ingress
  namespace: swe-ai-fleet
spec:
  podSelector:
    matchLabels:
      app: user-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fleet-proxy
      ports:
        - port: 50058
          protocol: TCP
